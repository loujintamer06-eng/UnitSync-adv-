<!DOCTYPE html>
<html>
<head>
    <title>Worker Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; }
        header { background: #1a1a2e; color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        nav { background: white; padding: 10px 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        nav a { margin-right: 20px; text-decoration: none; color: #333; padding: 10px; }
        nav a:hover { color: #4a6fa5; }
        .container { padding: 30px; }
        .welcome { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        h1 { color: #1a1a2e; }
        .logout { color: #dc3545; text-decoration: none; }
        .logout:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <header>
        <h1>Worker Dashboard</h1>
        <a href="/logout" class="logout">Logout</a>
    </header>
    <nav>
        <a href="/worker/dashboard">Dashboard</a>
        <a href="/worker/tasks">My Tasks</a>
        <a href="/worker/profile">Profile</a>
    </nav>
    <div class="container">
        <div class="welcome">
            <h1>Welcome, <span th:text="${user.name}"></span>!</h1>
            <p>Role: Worker</p>
        </div>
    </div>
</body>
</html>
