<!DOCTYPE html>
<html>
<head>
    <title>UnitSync - Home</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        :root {
            --bg: #f5f4f0;
            --surface: #ffffff;
            --accent: #3b5bdb;
            --text: #1a1a1a;
            --border: #e8e6e0;
        }

        body {
            font-family: 'Playfair Display', serif;
            background: var(--bg);
            min-height: 100vh;
        }

        nav {
            background: var(--surface);
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .nav-links a {
            margin-left: 30px;
            text-decoration: none;
            color: var(--text);
        }

        .nav-links a:hover {
            color: var(--accent);
        }

        .hero {
            text-align: center;
            padding: 100px 20px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: var(--accent);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            margin: 10px;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--accent);
            color: var(--accent);
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">
            <span style="color: var(--text); font-weight: 700;">Unit</span><span style="font-style: italic;">Sync</span>
        </div>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/about">About Us</a>
            <a href="/login">Login</a>
            <a href="/register">Register</a>
        </div>
    </nav>

    <div class="hero">
        <h1>Welcome to Unit<i>Sync</i></h1>
        <p>Your complete compound management solution</p>
        <a href="/login" class="btn">Login</a>
        <a href="/register" class="btn btn-outline">Register</a>
    </div>
</body>
</html>
