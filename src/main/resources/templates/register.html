<!DOCTYPE html>
<html>
<head>
    <title>UnitSync - Register</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        :root {
            --bg: #f5f4f0;
            --surface: #ffffff;
            --accent: #3b5bdb;
            --text: #1a1a1a;
            --muted: #888;
            --border: #e8e6e0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            background: var(--surface);
            border-radius: 20px;
            padding: 40px 48px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
            border: 1px solid var(--border);
            width: 100%;
            max-width: 500px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            text-align: center;
            margin-bottom: 28px;
        }

        h1 span:first-child { color: var(--text); }

        input, select {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 15px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            outline: none;
        }

        input:focus {
            border-color: var(--accent);
            background: var(--surface);
        }

        .radio-group {
            display: flex;
            gap: 20px;
            align-items: center;
            margin-bottom: 20px;
            padding: 10px 0;
        }

        .radio-group label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .radio-group input[type="radio"] {
            width: auto;
            margin: 0;
            cursor: pointer;
        }

        button {
            background: var(--accent);
            color: white;
            font-weight: 600;
            padding: 12px;
            width: 100%;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
        }

        button:hover {
            opacity: 0.85;
        }

        .login-link {
            margin-top: 24px;
            text-align: center;
            font-size: 0.85rem;
        }

        .login-link a {
            color: var(--accent);
            text-decoration: none;
        }

        .error {
            color: #c0392b;
            text-align: center;
            margin-top: 15px;
            padding: 10px;
            background: #fde8e8;
            border-radius: 8px;
        }

        .success {
            color: #2e7d32;
            text-align: center;
            margin-top: 15px;
            padding: 10px;
            background: #e6f4ea;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1><span><b>Unit</b></span><span><i>Sync</i></span></h1>
        
        <form method="POST" action="/register">
            <input type="text" name="username" placeholder="Username" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="tel" name="phone" placeholder="+201234567890" required>
            <input type="password" name="password" placeholder="Password" required>
            
            <div class="radio-group">
                Join as a
                <label>
                    <input type="radio" name="role" value="resident" checked> Resident
                </label>
                <label>
                    <input type="radio" name="role" value="worker"> Worker
                </label>
                <label>
                    <input type="radio" name="role" value="admin"> Admin
                </label>
            </div>
            
            <button type="submit">Register</button>
        </form>
        
        <div class="login-link">
            <a href="/login">Already have an account? Login</a>
        </div>
        
        <div class="error" th:if="${error}" th:text="${error}"></div>
        <div class="success" th:if="${success}" th:text="${success}"></div>
    </div>
</body>
</html>
