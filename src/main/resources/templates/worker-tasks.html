<!DOCTYPE html>
<html>
<head>
    <title>My Tasks</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; }
        header { background: #1a1a2e; color: white; padding: 15px 30px; display: flex; justify-content: space-between; }
        nav { background: white; padding: 10px 30px; }
        nav a { margin-right: 20px; text-decoration: none; color: #333; }
        .container { padding: 30px; }
        .add-form { background: white; padding: 20px; border-radius: 10px; margin-bottom: 30px; }
        table { width: 100%; background: white; border-radius: 10px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #4a6fa5; color: white; }
        input, select { padding: 8px; margin: 5px; border: 1px solid #ddd; border-radius: 5px; }
        button { background: #4a6fa5; color: white; padding: 8px 20px; border: none; border-radius: 5px; cursor: pointer; }
        .delete { color: #dc3545; text-decoration: none; }
        .status { padding: 5px 10px; border-radius: 5px; font-size: 12px; }
        .pending { background: #ffc107; }
        .in_progress { background: #17a2b8; color: white; }
        .done { background: #28a745; color: white; }
        h2 { margin-bottom: 15px; }
        .logout { color: #dc3545; text-decoration: none; }
    </style>
</head>
<body>
    <header>
        <h1>My Tasks</h1>
        <a href="/logout" class="logout">Logout</a>
    </header>
    <nav>
        <a href="/worker/dashboard">Dashboard</a>
        <a href="/worker/tasks">My Tasks</a>
        <a href="/worker/profile">Profile</a>
    </nav>
    <div class="container">
        <div class="add-form">
            <h2>Add New Task</h2>
            <form method="POST" action="/worker/tasks/add">
                <input type="text" name="unit" placeholder="Unit" required>
                <input type="text" name="issue" placeholder="Issue" required>
                <input type="date" name="date" required>
                <button type="submit">Add Task</button>
            </form>
        </div>
        
        <h2>Active Tasks</h2>
        <table>
            <tr>
                <th>Unit</th><th>Issue</th><th>Date</th><th>Status</th><th>Actions</th>
            </tr>
            <tr th:each="task : ${activeTasks}">
                <td th:text="${task.unit}"></td>
                <td th:text="${task.issue}"></td>
                <td th:text="${task.date}"></td>
                <td>
                    <form method="GET" action="/worker/tasks/update" style="display: inline;">
                        <input type="hidden" name="id" th:value="${task.id}">
                        <select name="status" onchange="this.form.submit()">
                            <option value="pending" th:selected="${task.status == 'pending'}">Pending</option>
                            <option value="in_progress" th:selected="${task.status == 'in_progress'}">In Progress</option>
                            <option value="done" th:selected="${task.status == 'done'}">Done</option>
                        </select>
                    </form>
                </td>
                <td><a class="delete" th:href="@{/worker/tasks/delete(id=${task.id})}" onclick="return confirm('Delete this task?')">Delete</a></td>
            </tr>
        </table>
        
        <h2>Completed Tasks</h2>
        <table>
            <tr>
                <th>Unit</th><th>Issue</th><th>Date</th><th>Status</th>
            </tr>
            <tr th:each="task : ${completedTasks}">
                <td th:text="${task.unit}"></td>
                <td th:text="${task.issue}"></td>
                <td th:text="${task.date}"></td>
                <td>✓ Done</td>
            </tr>
        </table>
    </div>
</body>
</html>
