<!DOCTYPE html>
<html>
<head>
    <title>UnitSync - Login</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        :root {
            --bg: #f5f4f0;
            --surface: #ffffff;
            --accent: #3b5bdb;
            --text: #1a1a1a;
            --muted: #888;
            --border: #e8e6e0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            background: var(--surface);
            border-radius: 20px;
            padding: 40px 48px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
            border: 1px solid var(--border);
            width: 100%;
            max-width: 460px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            text-align: center;
            margin-bottom: 28px;
            color: var(--text);
        }

        h1 b { font-weight: 700; }
        h1 i { font-style: italic; }

        form {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            outline: none;
        }

        input:focus {
            border-color: var(--accent);
            background: var(--surface);
        }

        button {
            background: var(--accent);
            color: white;
            font-weight: 600;
            padding: 12px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 8px;
        }

        button:hover {
            opacity: 0.85;
        }

        .register-link {
            margin-top: 24px;
            text-align: center;
            font-size: 0.85rem;
        }

        .register-link a {
            color: var(--accent);
            text-decoration: none;
        }

        .error {
            color: #c0392b;
            text-align: center;
            margin-top: 15px;
            padding: 10px;
            background: #fde8e8;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1><b>Unit</b><i>Sync</i></h1>
        
        <form method="POST" action="/login">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        
        <div class="register-link">
            <a href="/register">Don't have an account? Register</a>
        </div>
        
        <div class="error" th:if="${error}" th:text="${error}"></div>
    </div>
</body>
</html>
